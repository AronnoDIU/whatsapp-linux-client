name: whats-tux
title: WhatsApp Linux Client
base: core22
version: "0.1.0"
summary: WhatsApp Web desktop client for Linux
description: |
  Unofficial desktop wrapper for WhatsApp Web with tray support,
  native notifications, multi-account windows, and Linux-focused
  screen-sharing compatibility.

grade: stable
confinement: strict
license: MIT
compression: lzo
icon: snap/gui/icon.png
website: https://github.com/aronno/whatsapp-linux-client
source-code: https://github.com/aronno/whatsapp-linux-client
issues: https://github.com/aronno/whatsapp-linux-client/issues
contact: https://github.com/aronno/whatsapp-linux-client/issues

architectures:
  - build-on: amd64

apps:
  whats-tux:
    # command must match the actual executable produced by electron-builder
    # our Electron executable name is 'whats-tux' (see electron-builder.json5 executableName)
    command: whats-tux
    desktop: snap/gui/whats-tux.desktop
    plugs:
      - audio-playback
      - audio-record
      - camera
      - desktop
      - desktop-legacy
      - gsettings
      - home
      - network
      - network-bind
      - opengl
      - unity7
      - wayland
      - x11

parts:
  app:
    plugin: dump
    source: release/snapcraft/linux-unpacked
    stage:
      - "*"
    stage-packages:
      # Required for Electron runtime
      - libnss3
      - libxss1
      - libappindicator3-1
      - libgconf-2-4
      - libxkbfile1
      - libgbm1
      - libgl1-mesa-glx
      # Optional but recommended for better experience
      - libpulse0
      - libxcomposite1
      - libxdamage1
      - libxfixes3
      - libxrandr2
      - libxrender1
      - libxtst6
