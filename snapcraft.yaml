name: whats-tux
title: WhatsApp for Linux
base: core24
version: "0.1.0"
summary: WhatsApp Web desktop client for Linux
description: |
  **An elegant, open-source desktop client that elevates your WhatsApp Web experience on Linux with seamless system integration and power-user features.**
  
  ### 🌟 Key Features
  
  * **System Tray Support**
  Run quietly in the background with custom indicators and quick actions.
  * **Native Notifications**
  Receive instant desktop alerts with quick reply actions and message preview.
  * **Multi-Account Windows**
  Manage multiple phone numbers simultaneously in separate windows.
  * **Linux Screen Sharing**
  Enjoy reliable, hassle-free sharing fully compatible with Linux via PipeWire.
  * **Lightweight Performance**
  Optimized resource usage compared to standard browser tabs.
  
  ### 🎨 UI/UX Improvements
  
  * **Dark Mode Toggle** - Automatic system theme detection with manual override (Auto/Light/Dark)
  * **Compact Mode** - Smaller UI elements optimized for laptop users
  * **Spell Checker** - Multi-language support including English, Spanish, French, German, Italian, Portuguese, and Russian
  * **Beautiful Settings UI** - Easy-to-use settings panel with real-time updates
  
  ### 🔔 Enhanced Notifications
  
  * **Notification Actions** - Quick reply and mark as read buttons in notifications
  * **Message Preview** - Show message content in notifications (toggleable)
  * **Do Not Disturb Mode** - Mute notifications during specific hours
  * **Smart DND** - Automatically suppress notifications during configured quiet hours
  
  ### ⚡ Advanced Features
  
  * **Message Search** - Search across all conversations (Ctrl+Alt+S)
  * **Quick Reply Templates** - Save and reuse common responses (Ctrl+Alt+T)
  * **Auto-Reply Mode** - Basic auto-reply for busy mode with keyword triggers (Ctrl+Alt+B)
  * **Productivity Shortcuts** - Additional keyboard shortcuts for power users
  * **Bengali Typography** - Optimized Bangla font rendering with Noto Bengali fonts

grade: stable
confinement: strict
license: MIT
compression: lzo
icon: snap/gui/icon.png
website: https://github.com/AronnoDIU
source-code: https://github.com/AronnoDIU/whatsapp-linux-client
issues: https://github.com/AronnoDIU/whatsapp-linux-client/issues
contact: https://www.linkedin.com/in/yeasirarafataronno/

platforms:
  amd64:
    build-on: amd64
    build-for: amd64

apps:
  whats-tux:
    # command must match the actual executable produced by electron-builder
    # our Electron executable name is 'whats-tux' (see electron-builder.json5 executableName)
    command: whats-tux
    desktop: snap/gui/whats-tux.desktop
    plugs:
      - audio-playback
      - audio-record
      - camera
      - desktop
      - desktop-legacy
      - gsettings
      - home
      - network
      - network-bind
      - opengl
      - unity7
      - wayland
      - x11

parts:
  app:
    plugin: dump
    source: release/snapcraft/linux-unpacked
    stage:
      - "*"
    stage-packages:
      # Core dependencies for Electron
      - libnss3
      - libxss1
      - libappindicator3-1
      - libxkbfile1
      - libpulse0
      - libasound2t64
      - libxcomposite1
      - libxdamage1
      - libxfixes3
      - libxrandr2
      - libxrender1
      - libxtst6
      - libxext6
      - libxinerama1
      - libxi6
      - libxcursor1
      - libxkbcommon0
      # Graphics and GPU support (packages verified in core24)
      - libgbm1
      - libdrm2
      # OSS compatibility library (legacy audio) - provides libOSSlib.so
      - liboss4-salsa2
