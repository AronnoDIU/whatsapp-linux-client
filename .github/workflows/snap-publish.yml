name: Snap Publish

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Snap channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - candidate
          - beta
          - edge
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  publish-snap:
    runs-on: ubuntu-latest
    concurrency:
      group: snap-publish-${{ github.ref }}
      cancel-in-progress: true
    timeout-minutes: 45
    permissions:
      contents: read

    env:
      SNAP_CHANNEL: ${{ github.event.inputs.channel || 'stable' }}
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_LOGIN_FILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Install dependencies
        run: npm ci

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build Snap artifact
        run: npm run dist:snap

      - name: Validate Snapcraft credentials
        run: |
          if [ -z "$SNAPCRAFT_STORE_CREDENTIALS" ]; then
            echo "SNAPCRAFT_LOGIN_FILE secret is missing" >&2
            exit 1
          fi
          echo "Snapcraft credentials detected."

      - name: Upload and release Snap
        run: |
          SNAP_FILE="$(find release -type f -name '*.snap' | head -n 1)"
          if [ -z "$SNAP_FILE" ]; then
            echo "No .snap file produced" >&2
            exit 1
          fi
          echo "Uploading $SNAP_FILE to channel '$SNAP_CHANNEL'"
          snapcraft upload "$SNAP_FILE" --release="$SNAP_CHANNEL"

